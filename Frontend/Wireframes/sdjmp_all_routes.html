
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; }
  .wrap { padding: 12px 0; font-size: 13px; color: var(--color-text-primary); }
  .section { margin-bottom: 24px; }
  .section-title { font-size: 15px; font-weight: 500; margin-bottom: 10px; padding: 6px 12px; border-radius: var(--border-radius-md); }
  .routes { display: flex; flex-direction: column; gap: 4px; }
  .route { display: flex; align-items: baseline; gap: 10px; padding: 5px 10px; border-radius: 6px; transition: background 0.15s; cursor: default; }
  .route:hover { background: var(--color-background-secondary); }
  .method { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 4px; min-width: 42px; text-align: center; letter-spacing: 0.5px; }
  .GET    { background: #E1F5EE; color: #0F6E56; }
  .POST   { background: #E6F1FB; color: #185FA5; }
  .PUT    { background: #FAEEDA; color: #854F0B; }
  .PATCH  { background: #EEEDFE; color: #534AB7; }
  .DELETE { background: #FCEBEB; color: #A32D2D; }
  .path { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-primary); min-width: 300px; }
  .desc { color: var(--color-text-secondary); font-size: 12px; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tab { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--color-border-secondary); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; color: var(--color-text-secondary); }
  .tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
  .tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 500; }
  .auth-guard { background: #FAEEDA; color: #854F0B; }
  .admin-guard { background: #FCEBEB; color: #A32D2D; }
  .employer-guard { background: #E6F1FB; color: #185FA5; }
  .student-guard { background: #E1F5EE; color: #0F6E56; }
  .group-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.8px; padding: 8px 10px 2px; }
  @media (prefers-color-scheme: dark) {
    .GET    { background: #085041; color: #9FE1CB; }
    .POST   { background: #0C447C; color: #B5D4F4; }
    .PUT    { background: #633806; color: #FAC775; }
    .PATCH  { background: #3C3489; color: #CECBF6; }
    .DELETE { background: #791F1F; color: #F7C1C1; }
    .auth-guard { background: #633806; color: #FAC775; }
    .admin-guard { background: #791F1F; color: #F7C1C1; }
    .employer-guard { background: #0C447C; color: #B5D4F4; }
    .student-guard { background: #085041; color: #9FE1CB; }
  }
</style>
<div class="wrap">
  <div class="tabs" id="tabs">
    <div class="tab active" onclick="show('all')">All Routes</div>
    <div class="tab" onclick="show('public')">Public</div>
    <div class="tab" onclick="show('auth')">Auth</div>
    <div class="tab" onclick="show('student')">Student</div>
    <div class="tab" onclick="show('employer')">Employer</div>
    <div class="tab" onclick="show('admin')">Admin</div>
  </div>
  <div id="content"></div>
</div>

function show(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  const content = document.getElementById('content');
  const toShow = tab === 'all' ? Object.values(routes) : [routes[tab]];

  content.innerHTML = toShow.map(section => `
    <div class="section">
      <div class="section-title" style="border-left: 3px solid var(--color-text-secondary); padding-left: 10px; color: var(--color-text-secondary);">${section.label}</div>
      ${section.groups.map(g => `
        <div class="group-label">${g.name}</div>
        <div class="routes">
          ${g.items.map(r => `
            <div class="route">
              <span class="method ${r.m}">${r.m}</span>
              <span class="path">${r.p}</span>
              <span class="desc">${r.d}</span>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>
  `).join('');
}
